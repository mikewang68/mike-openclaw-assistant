strategies:
  grid:
    name: "网格交易策略"
    enabled: true
    params:
      grid_count: 5           # 网格数量
      grid_range_pct: 0.10    # 网格区间（±10%）
      order_pct: 0.10         # 每格下单金额比例
      symbol: "BTCUSDT"

  macd_rsi:
    name: "MACD+RSI双指标策略"
    enabled: true
    params:
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9
      rsi_period: 14
      rsi_oversold: 30
      rsi_overbought: 70
      symbols: ["000001", "000002"]  # A股股票池

  bollinger_volume:
    name: "布林带+成交量策略"
    enabled: false
    params:
      bb_period: 20
      bb_std: 2
      volume_confirm: true
      volume_threshold: 1.5
